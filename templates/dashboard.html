{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>All Students</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>

            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>

            <td>

                <a href="/edit/{{ student.id }}"
                class="action-btn edit-btn">
                    Edit
                </a>

                <a href="/delete/{{ student.id }}"
                class="action-btn delete-btn">
                    Delete
                </a>

            </td>

        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
