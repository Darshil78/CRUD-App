{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Add Student</h2>

    <form method="POST">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label>Course</label>
            <input type="text" name="course">
        </div>

        <button class="btn">
            Save Student
        </button>

    </form>

</div>

{% endblock %}
